openapi: 3.1.0
info:
  title: Billing Disputes API
  version: 1.0.0
  description: Internal API for managing payment disputes in the billing portal
servers:
  - url: https://api.example.com
    description: Production
  - url: http://localhost:8000
    description: Development

paths:
  /disputes:
    get:
      operationId: listDisputes
      summary: List disputes with filtering
      tags:
        - Disputes
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [open, investigating, waiting_on_customer, resolved, rejected]
        - name: assigned_to
          in: query
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of disputes
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Dispute'
                  total:
                    type: integer
                  next_token:
                    type: string
                    nullable: true
        '401':
          description: Unauthorized
    post:
      operationId: createDispute
      summary: Create a new dispute (agent only)
      tags:
        - Disputes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                invoice_id:
                  type: string
                customer_id:
                  type: string
                reason_code:
                  type: string
                  enum: [billing_error, duplicate, unauthorized, other]
                notes:
                  type: string
                  nullable: true
              required:
                - invoice_id
                - customer_id
                - reason_code
      responses:
        '201':
          description: Dispute created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dispute'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (agent role required)

  /disputes/{dispute_id}:
    get:
      operationId: getDispute
      summary: Retrieve dispute details
      tags:
        - Disputes
      parameters:
        - name: dispute_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Dispute details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dispute'
        '404':
          description: Dispute not found
        '401':
          description: Unauthorized

  /disputes/{dispute_id}/transition:
    post:
      operationId: transitionDispute
      summary: Transition dispute to new status
      tags:
        - Disputes
      parameters:
        - name: dispute_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                to_status:
                  type: string
                  enum: [open, investigating, waiting_on_customer, resolved, rejected]
                reason:
                  type: string
                  nullable: true
              required:
                - to_status
      responses:
        '200':
          description: Dispute transitioned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dispute'
        '409':
          description: Invalid state transition
        '404':
          description: Dispute not found
        '401':
          description: Unauthorized

  /disputes/{dispute_id}/comments:
    post:
      operationId: addComment
      summary: Add comment to dispute
      tags:
        - Disputes
      parameters:
        - name: dispute_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: body
          in: query
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Comment added
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  created_at:
                    type: string
                    format: date-time
        '404':
          description: Dispute not found
        '401':
          description: Unauthorized

  /disputes/{dispute_id}/activity:
    get:
      operationId: getActivity
      summary: Retrieve dispute activity timeline
      tags:
        - Disputes
      parameters:
        - name: dispute_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Activity history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DisputeHistoryEntry'
        '404':
          description: Dispute not found
        '401':
          description: Unauthorized

components:
  schemas:
    Dispute:
      type: object
      properties:
        id:
          type: string
          format: uuid
        invoice_id:
          type: string
        customer_id:
          type: string
        reason_code:
          type: string
          enum: [billing_error, duplicate, unauthorized, other]
        notes:
          type: string
          nullable: true
        status:
          type: string
          enum: [open, investigating, waiting_on_customer, resolved, rejected]
        assigned_to:
          type: string
          format: uuid
          nullable: true
        created_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        sla_deadline:
          type: string
          format: date-time
        resolved_at:
          type: string
          format: date-time
          nullable: true
        outcome:
          type: string
          enum: [refund, credit, reject, under_investigation]
          nullable: true
      required:
        - id
        - invoice_id
        - customer_id
        - reason_code
        - status
        - created_by
        - created_at
        - updated_at
        - sla_deadline

    DisputeHistoryEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        dispute_id:
          type: string
          format: uuid
        action:
          type: string
          enum: [created, transitioned, assigned, commented, outcome_set]
        actor_id:
          type: string
          format: uuid
        old_value:
          type: object
          nullable: true
        new_value:
          type: object
          nullable: true
        reason:
          type: string
          nullable: true
        metadata:
          type: object
          nullable: true
        created_at:
          type: string
          format: date-time
      required:
        - id
        - dispute_id
        - action
        - actor_id
        - created_at

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
