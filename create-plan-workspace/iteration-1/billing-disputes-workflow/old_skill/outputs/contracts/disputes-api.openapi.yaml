openapi: 3.0.3
info:
  title: Billing Disputes API
  version: 1.0.0
  description: REST API for dispute management in internal billing portal

servers:
  - url: http://localhost:8000/api
    description: Local development
  - url: https://api.example.com/api
    description: Production

paths:
  /disputes:
    post:
      summary: Create a new dispute
      operationId: createDispute
      tags:
        - Disputes
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDisputeRequest'
      responses:
        '201':
          description: Dispute created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisputeResponse'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - only agents can create disputes

    get:
      summary: List disputes with filtering and pagination
      operationId: listDisputes
      tags:
        - Disputes
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [open, investigating, waiting_on_customer, resolved, rejected]
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: cursor
          in: query
          schema:
            type: string
          description: Cursor for pagination
      responses:
        '200':
          description: List of disputes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisputeListResponse'
        '401':
          description: Unauthorized

  /disputes/{disputeId}:
    get:
      summary: Get dispute details
      operationId: getDispute
      tags:
        - Disputes
      security:
        - bearerAuth: []
      parameters:
        - name: disputeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Dispute details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisputeDetailResponse'
        '404':
          description: Dispute not found

    patch:
      summary: Update dispute (assign, add notes, override)
      operationId: updateDispute
      tags:
        - Disputes
      security:
        - bearerAuth: []
      parameters:
        - name: disputeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDisputeRequest'
      responses:
        '200':
          description: Dispute updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisputeResponse'
        '400':
          description: Invalid state transition
        '403':
          description: Insufficient permissions

  /disputes/{disputeId}/transition:
    post:
      summary: Transition dispute status
      operationId: transitionDispute
      tags:
        - Disputes
      security:
        - bearerAuth: []
      parameters:
        - name: disputeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitionRequest'
      responses:
        '200':
          description: Status transitioned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisputeResponse'
        '400':
          description: Invalid transition

  /disputes/{disputeId}/audit:
    get:
      summary: Get audit trail for dispute
      operationId: getAuditTrail
      tags:
        - Disputes
      security:
        - bearerAuth: []
      parameters:
        - name: disputeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Audit events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditTrailResponse'

  /disputes/export:
    get:
      summary: Export disputes for a month as CSV
      operationId: exportDisputes
      tags:
        - Disputes
      security:
        - bearerAuth: []
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
            minimum: 2000
        - name: month
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
      responses:
        '200':
          description: CSV file
          content:
            text/csv:
              schema:
                type: string

components:
  schemas:
    CreateDisputeRequest:
      type: object
      required:
        - invoice_id
        - customer_id
        - reason_code
      properties:
        invoice_id:
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
        reason_code:
          type: string
          enum: [invoice_error, duplicate_charge, unauthorized, service_quality, other]
        notes:
          type: string

    UpdateDisputeRequest:
      type: object
      properties:
        assigned_to:
          type: string
          format: uuid
        notes:
          type: string
        manager_override:
          type: boolean
        override_notes:
          type: string

    TransitionRequest:
      type: object
      required:
        - new_status
      properties:
        new_status:
          type: string
          enum: [open, investigating, waiting_on_customer, resolved, rejected]
        notes:
          type: string

    DisputeResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        invoice_id:
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [open, investigating, waiting_on_customer, resolved, rejected]
        reason_code:
          type: string
        notes:
          type: string
        created_at:
          type: string
          format: date-time
        created_by:
          type: string
          format: uuid
        assigned_to:
          type: string
          format: uuid
          nullable: true
        manager_override:
          type: boolean
        override_notes:
          type: string
          nullable: true
        sla_deadline_24h:
          type: string
          format: date-time
        sla_deadline_48h:
          type: string
          format: date-time

    DisputeDetailResponse:
      allOf:
        - $ref: '#/components/schemas/DisputeResponse'
        - type: object
          properties:
            created_by_name:
              type: string
            assigned_to_name:
              type: string
              nullable: true
            recent_comments:
              type: array
              items:
                type: object
                properties:
                  actor:
                    type: string
                  text:
                    type: string
                  created_at:
                    type: string
                    format: date-time

    DisputeListResponse:
      type: object
      properties:
        total:
          type: integer
        cursor:
          type: string
          nullable: true
        disputes:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              invoice_id:
                type: string
                format: uuid
              customer_id:
                type: string
                format: uuid
              status:
                type: string
              reason_code:
                type: string
              created_at:
                type: string
                format: date-time
              created_by_name:
                type: string
              assigned_to_name:
                type: string
                nullable: true

    AuditEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        action:
          type: string
          enum: [created, status_changed, assigned, notes_added, override_applied]
        actor_id:
          type: string
          format: uuid
        actor_name:
          type: string
        old_state:
          type: object
          nullable: true
        new_state:
          type: object
        reason:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    AuditTrailResponse:
      type: object
      properties:
        dispute_id:
          type: string
          format: uuid
        events:
          type: array
          items:
            $ref: '#/components/schemas/AuditEvent'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
