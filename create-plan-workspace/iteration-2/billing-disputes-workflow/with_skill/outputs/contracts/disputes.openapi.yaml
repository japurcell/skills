openapi: 3.1.0
info:
  title: Billing Disputes API
  version: 1.0.0
paths:
  /api/disputes:
    get:
      summary: List disputes
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [open, investigating, waiting_on_customer, resolved, rejected]
        - in: query
          name: assigneeId
          schema:
            type: string
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: Paginated dispute list
    post:
      summary: Create dispute
      responses:
        "201":
          description: Dispute created
  /api/disputes/{disputeId}:
    get:
      summary: Get dispute detail
      parameters:
        - in: path
          name: disputeId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Dispute detail with activity timeline
  /api/disputes/{disputeId}/transitions:
    post:
      summary: Transition dispute status
      description: Agents may perform allowed transitions; managers may override.
      responses:
        "200":
          description: Status updated and audit event appended
  /api/disputes/{disputeId}/assignment:
    post:
      summary: Reassign dispute
      description: Manager role required.
      responses:
        "200":
          description: Assignment updated and history recorded
  /api/disputes/export:
    get:
      summary: Export monthly dispute outcomes as CSV
      parameters:
        - in: query
          name: month
          required: true
          schema:
            type: string
            pattern: '^\\d{4}-\\d{2}$'
      responses:
        "200":
          description: CSV stream
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    Dispute:
      type: object
      required: [id, invoiceId, customerId, reasonCode, status, createdAt]
      properties:
        id:
          type: string
          format: uuid
        invoiceId:
          type: string
        customerId:
          type: string
        reasonCode:
          type: string
        notes:
          type: string
        status:
          type: string
          enum: [open, investigating, waiting_on_customer, resolved, rejected]
        assigneeUserId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
