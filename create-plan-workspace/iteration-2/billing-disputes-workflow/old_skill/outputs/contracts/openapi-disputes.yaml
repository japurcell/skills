openapi: 3.0.3
info:
  title: Billing Disputes API
  version: 1.0.0
servers:
  - url: https://internal-billing.example.com
paths:
  /disputes:
    get:
      summary: List disputes
      parameters:
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/DisputeStatus"
        - in: query
          name: assigneeId
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: Dispute list
          content:
            application/json:
              schema:
                type: object
                required: [items, page, pageSize, total]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Dispute"
                  page:
                    type: integer
                  pageSize:
                    type: integer
                  total:
                    type: integer
    post:
      summary: Create a dispute
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDisputeRequest"
      responses:
        "201":
          description: Dispute created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dispute"
  /disputes/{disputeId}:
    get:
      summary: Get dispute detail
      parameters:
        - in: path
          name: disputeId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Dispute detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisputeDetail"
        "404":
          description: Not found
  /disputes/{disputeId}/transitions:
    post:
      summary: Transition dispute status
      parameters:
        - in: path
          name: disputeId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransitionDisputeRequest"
      responses:
        "200":
          description: Updated dispute
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dispute"
        "400":
          description: Invalid transition
        "403":
          description: Forbidden
  /disputes/{disputeId}/assignment:
    post:
      summary: Change dispute assignment
      parameters:
        - in: path
          name: disputeId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeAssignmentRequest"
      responses:
        "200":
          description: Updated dispute
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dispute"
        "403":
          description: Forbidden
  /disputes/exports/monthly:
    get:
      summary: Export monthly dispute outcomes as CSV
      parameters:
        - in: query
          name: month
          required: true
          schema:
            type: string
            pattern: '^\\d{4}-\\d{2}$'
      responses:
        "200":
          description: CSV export
          content:
            text/csv:
              schema:
                type: string
components:
  schemas:
    DisputeStatus:
      type: string
      enum: [open, investigating, waiting_on_customer, resolved, rejected]
    Dispute:
      type: object
      required:
        - id
        - invoiceId
        - customerId
        - reasonCode
        - status
        - createdAt
        - slaWarnAt
        - slaBreachAt
      properties:
        id:
          type: string
          format: uuid
        invoiceId:
          type: string
        customerId:
          type: string
        reasonCode:
          type: string
        notes:
          type: string
        status:
          $ref: "#/components/schemas/DisputeStatus"
        outcome:
          type: string
          nullable: true
        assignedToUserId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        slaWarnAt:
          type: string
          format: date-time
        slaBreachAt:
          type: string
          format: date-time
    DisputeActivity:
      type: object
      required: [id, eventType, actorUserId, createdAt]
      properties:
        id:
          type: string
          format: uuid
        eventType:
          type: string
          enum:
            [
              created,
              status_changed,
              comment_added,
              assignment_changed,
              outcome_overridden,
            ]
        actorUserId:
          type: string
        actorRole:
          type: string
          enum: [agent, manager]
        fromStatus:
          $ref: "#/components/schemas/DisputeStatus"
          nullable: true
        toStatus:
          $ref: "#/components/schemas/DisputeStatus"
          nullable: true
        commentText:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    DisputeDetail:
      allOf:
        - $ref: "#/components/schemas/Dispute"
        - type: object
          required: [timeline]
          properties:
            timeline:
              type: array
              items:
                $ref: "#/components/schemas/DisputeActivity"
    CreateDisputeRequest:
      type: object
      required: [invoiceId, customerId, reasonCode, notes]
      properties:
        invoiceId:
          type: string
        customerId:
          type: string
        reasonCode:
          type: string
        notes:
          type: string
    TransitionDisputeRequest:
      type: object
      required: [toStatus]
      properties:
        toStatus:
          $ref: "#/components/schemas/DisputeStatus"
        comment:
          type: string
        managerOverride:
          type: boolean
          default: false
    ChangeAssignmentRequest:
      type: object
      required: [assignedToUserId]
      properties:
        assignedToUserId:
          type: string
        comment:
          type: string
