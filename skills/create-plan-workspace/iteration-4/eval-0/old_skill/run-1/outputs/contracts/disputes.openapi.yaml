openapi: 3.1.0
info:
  title: Billing Disputes API
  version: 0.1.0
  summary: Internal billing portal contract for dispute workflow operations
  description: |
    Contract for creating, listing, viewing, transitioning, assigning, and exporting
    billing disputes in the internal billing portal.
servers:
  - url: https://billing-portal.internal
security:
  - bearerAuth: []
tags:
  - name: disputes
    description: Dispute workflow endpoints for agents and managers
paths:
  /api/disputes:
    get:
      tags: [disputes]
      summary: List disputes
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/DisputeStatus'
        - in: query
          name: assigneeId
          schema:
            type: string
        - in: query
          name: customerId
          schema:
            type: string
        - in: query
          name: invoiceId
          schema:
            type: string
        - in: query
          name: slaState
          schema:
            $ref: '#/components/schemas/DisputeSlaState'
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        '200':
          description: Paginated disputes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDisputes'
    post:
      tags: [disputes]
      summary: Create a dispute
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDisputeRequest'
      responses:
        '201':
          description: Dispute created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisputeDetail'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/disputes/{disputeId}:
    get:
      tags: [disputes]
      summary: Get dispute detail
      parameters:
        - $ref: '#/components/parameters/DisputeId'
      responses:
        '200':
          description: Dispute detail with timeline
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisputeDetail'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/disputes/{disputeId}/transitions:
    post:
      tags: [disputes]
      summary: Change dispute status or override a terminal outcome
      parameters:
        - $ref: '#/components/parameters/DisputeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitionDisputeRequest'
      responses:
        '200':
          description: Updated dispute detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisputeDetail'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/disputes/{disputeId}/assignment:
    post:
      tags: [disputes]
      summary: Assign or reassign a dispute
      parameters:
        - $ref: '#/components/parameters/DisputeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignmentChangeRequest'
      responses:
        '200':
          description: Updated dispute detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisputeDetail'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/disputes/exports/monthly:
    get:
      tags: [disputes]
      summary: Export monthly dispute outcomes as CSV
      parameters:
        - in: query
          name: month
          required: true
          schema:
            type: string
            pattern: '^[0-9]{4}-[0-9]{2}$'
          description: Calendar month in YYYY-MM format using the terminal `resolved_at` month
      responses:
        '200':
          description: CSV export for the requested month
          content:
            text/csv:
              schema:
                type: string
                format: binary
        '403':
          $ref: '#/components/responses/Forbidden'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    DisputeId:
      in: path
      name: disputeId
      required: true
      schema:
        type: string
        format: uuid
  responses:
    Forbidden:
      description: User does not have permission for this action
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Dispute not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Invalid state transition or concurrent update
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    DisputeStatus:
      type: string
      enum: [open, investigating, waiting_on_customer, resolved, rejected]
    DisputeSlaState:
      type: string
      enum: [on_track, warning, breached, stopped]
    DisputeSummary:
      type: object
      required:
        [id, invoiceId, customerId, reasonCode, status, slaState, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        invoiceId:
          type: string
        customerId:
          type: string
        reasonCode:
          type: string
        status:
          $ref: '#/components/schemas/DisputeStatus'
        slaState:
          $ref: '#/components/schemas/DisputeSlaState'
        assignedAgentId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        warnAt:
          type: string
          format: date-time
        breachAt:
          type: string
          format: date-time
    DisputeActivity:
      type: object
      required: [id, activityType, actorUserId, occurredAt]
      properties:
        id:
          type: string
          format: uuid
        activityType:
          type: string
          enum: [created, comment_added, status_changed, assignment_changed, outcome_overridden]
        actorUserId:
          type: string
        fromStatus:
          $ref: '#/components/schemas/DisputeStatus'
        toStatus:
          $ref: '#/components/schemas/DisputeStatus'
        fromAssigneeId:
          type: string
          nullable: true
        toAssigneeId:
          type: string
          nullable: true
        comment:
          type: string
        occurredAt:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true
    DisputeDetail:
      allOf:
        - $ref: '#/components/schemas/DisputeSummary'
        - type: object
          required: [notes, createdByUserId, activities, canOverrideOutcome]
          properties:
            notes:
              type: string
            createdByUserId:
              type: string
            resolutionCode:
              type: string
              nullable: true
            resolutionSummary:
              type: string
              nullable: true
            managerOverrideBy:
              type: string
              nullable: true
            managerOverrideReason:
              type: string
              nullable: true
            resolvedAt:
              type: string
              format: date-time
              nullable: true
            canOverrideOutcome:
              type: boolean
            activities:
              type: array
              items:
                $ref: '#/components/schemas/DisputeActivity'
    PaginatedDisputes:
      type: object
      required: [items, page, pageSize, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DisputeSummary'
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
    CreateDisputeRequest:
      type: object
      required: [invoiceId, customerId, reasonCode, notes]
      properties:
        invoiceId:
          type: string
        customerId:
          type: string
        reasonCode:
          type: string
        notes:
          type: string
          minLength: 1
        assignedAgentId:
          type: string
          nullable: true
    TransitionDisputeRequest:
      type: object
      required: [toStatus]
      properties:
        toStatus:
          $ref: '#/components/schemas/DisputeStatus'
        comment:
          type: string
        resolutionCode:
          type: string
        resolutionSummary:
          type: string
        overrideReason:
          type: string
    AssignmentChangeRequest:
      type: object
      required: [assigneeId]
      properties:
        assigneeId:
          type: string
          nullable: true
        comment:
          type: string
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
