openapi: 3.1.0
info:
  title: Billing Disputes API
  version: 1.0.0
  summary: Contract for internal billing dispute workflow management.
  description: |
    OpenAPI contract for the billing portal disputes workflow described in
    /home/adam/dev/personal/skills/skills/create-plan-workspace/iteration-3/inputs/spec-billing-disputes.md.
    This contract is intended to mirror the FastAPI-generated schema for the backend service.
tags:
  - name: Disputes
    description: Create, list, inspect, and mutate billing disputes.
  - name: Exports
    description: Operational reporting endpoints for disputes.
paths:
  /api/disputes:
    get:
      tags: [Disputes]
      operationId: listDisputes
      summary: List disputes
      description: Returns a cursor-paginated list ordered by `created_at DESC, id DESC`.
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/DisputeStatus'
        - name: assigneeUserId
          in: query
          schema:
            type: string
        - name: customerId
          in: query
          schema:
            type: string
        - name: invoiceId
          in: query
          schema:
            type: string
        - name: cursor
          in: query
          schema:
            type: string
          description: Opaque cursor derived from `created_at` + `id`.
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        '200':
          description: Dispute page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisputePage'
    post:
      tags: [Disputes]
      operationId: createDispute
      summary: Create dispute
      description: Creates a dispute; intended for authenticated users with agent capabilities.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDisputeRequest'
      responses:
        '201':
          description: Dispute created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisputeDetail'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/disputes/{disputeId}:
    get:
      tags: [Disputes]
      operationId: getDispute
      summary: Get dispute detail
      parameters:
        - name: disputeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Dispute detail with ordered timeline
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisputeDetail'
        '404':
          description: Dispute not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/disputes/{disputeId}/transitions:
    post:
      tags: [Disputes]
      operationId: transitionDispute
      summary: Change dispute status
      description: Applies a server-validated state transition and appends a timeline event.
      parameters:
        - name: disputeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitionRequest'
      responses:
        '200':
          description: Updated dispute detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisputeDetail'
        '409':
          description: Invalid transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/disputes/{disputeId}/assignment:
    post:
      tags: [Disputes]
      operationId: reassignDispute
      summary: Reassign dispute
      description: Manager-only assignee change that also appends an assignment event.
      parameters:
        - name: disputeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignmentRequest'
      responses:
        '200':
          description: Updated dispute detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisputeDetail'
        '403':
          description: Caller lacks manager permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/disputes/exports/monthly:
    get:
      tags: [Exports]
      operationId: exportMonthlyDisputes
      summary: Export monthly dispute outcomes as CSV
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: string
            pattern: '^\d{4}-\d{2}$'
          description: Reporting month in `YYYY-MM` format.
      responses:
        '200':
          description: CSV export for the selected month
          content:
            text/csv:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid month value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  schemas:
    DisputeStatus:
      type: string
      enum: [open, investigating, waiting_on_customer, resolved, rejected]
    SlaState:
      type: string
      enum: [healthy, warning, breached]
    DisputeSummary:
      type: object
      required:
        - id
        - invoiceId
        - customerId
        - reasonCode
        - status
        - slaState
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        invoiceId:
          type: string
        customerId:
          type: string
        reasonCode:
          type: string
        status:
          $ref: '#/components/schemas/DisputeStatus'
        currentAssigneeUserId:
          type: [string, 'null']
        slaState:
          $ref: '#/components/schemas/SlaState'
        slaWarnAt:
          type: string
          format: date-time
        slaBreachAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    DisputeEvent:
      type: object
      required:
        - id
        - eventType
        - actorRole
        - occurredAt
      properties:
        id:
          type: string
          format: uuid
        eventType:
          type: string
          enum: [created, status_changed, comment_added, assignment_changed, manager_override, sla_warning, sla_breach, exported]
        actorUserId:
          type: [string, 'null']
        actorRole:
          type: string
          enum: [agent, manager, system]
        fromStatus:
          type: [string, 'null']
        toStatus:
          type: [string, 'null']
        fromAssigneeUserId:
          type: [string, 'null']
        toAssigneeUserId:
          type: [string, 'null']
        commentBody:
          type: [string, 'null']
        metadata:
          type: object
          additionalProperties: true
        occurredAt:
          type: string
          format: date-time
    DisputeDetail:
      allOf:
        - $ref: '#/components/schemas/DisputeSummary'
        - type: object
          properties:
            notes:
              type: [string, 'null']
            createdByUserId:
              type: string
            managerOverrideActive:
              type: boolean
            managerOverrideByUserId:
              type: [string, 'null']
            resolutionSummary:
              type: [string, 'null']
            timeline:
              type: array
              items:
                $ref: '#/components/schemas/DisputeEvent'
    DisputePage:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DisputeSummary'
        nextCursor:
          type: [string, 'null']
    CreateDisputeRequest:
      type: object
      required: [invoiceId, customerId, reasonCode]
      properties:
        invoiceId:
          type: string
        customerId:
          type: string
        reasonCode:
          type: string
        notes:
          type: [string, 'null']
    TransitionRequest:
      type: object
      required: [targetStatus]
      properties:
        targetStatus:
          $ref: '#/components/schemas/DisputeStatus'
        comment:
          type: [string, 'null']
        managerOverride:
          type: boolean
          default: false
        resolutionSummary:
          type: [string, 'null']
    AssignmentRequest:
      type: object
      required: [assigneeUserId]
      properties:
        assigneeUserId:
          type: string
        comment:
          type: [string, 'null']
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
