openapi: 3.0.3
info:
  title: Release Calendar Role Controls API
  version: 1.0.0
  description: Additive workflow endpoints for role-aware release-window approvals and pending approvals.
servers:
  - url: /api
paths:
  /release-windows/{id}/transitions:
    post:
      summary: Transition a release window through the audited approval workflow
      tags: [ReleaseWindows]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitionRequest'
      responses:
        '200':
          description: Transition applied successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReleaseWindowDetail'
        '400':
          description: Invalid payload or missing reason
        '403':
          description: Caller lacks permission for the requested transition
        '404':
          description: Release window not found
        '409':
          description: Illegal transition or optimistic locking conflict
  /release-windows/approvals/pending:
    get:
      summary: List pending approvals grouped by product area
      tags: [Approvals]
      parameters:
        - name: productArea
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        '200':
          description: Grouped pending approvals
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PendingApprovalsResponse'
        '403':
          description: Caller lacks release-manager permission
components:
  schemas:
    TransitionRequest:
      type: object
      required:
        - targetState
        - reason
      properties:
        targetState:
          type: string
          enum: [proposed, approved, blocked, cancelled]
        reason:
          type: string
          minLength: 3
          maxLength: 1000
        expectedVersion:
          type: integer
          minimum: 0
        metadata:
          type: object
          additionalProperties: true
          description: Optional caller-supplied metadata captured with the transition audit record.
    ReleaseWindowDetail:
      type: object
      required:
        - id
        - productArea
        - title
        - startAt
        - endAt
        - state
        - version
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        productArea:
          type: string
        title:
          type: string
        description:
          type: string
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        state:
          type: string
          enum: [draft, proposed, approved, blocked, cancelled]
        version:
          type: integer
        updatedAt:
          type: string
          format: date-time
        availableTransitions:
          type: array
          items:
            type: string
            enum: [proposed, approved, blocked, cancelled]
        latestTransition:
          $ref: '#/components/schemas/TransitionAuditEntry'
    TransitionAuditEntry:
      type: object
      required:
        - fromState
        - toState
        - reason
        - actorId
        - actorRole
        - createdAt
      properties:
        fromState:
          type: string
          enum: [draft, proposed, approved, blocked, cancelled]
        toState:
          type: string
          enum: [draft, proposed, approved, blocked, cancelled]
        reason:
          type: string
        actorId:
          type: string
        actorRole:
          type: string
          enum: [viewer, editor, release_manager]
        createdAt:
          type: string
          format: date-time
    PendingApprovalsResponse:
      type: object
      required:
        - groups
      properties:
        groups:
          type: array
          items:
            $ref: '#/components/schemas/PendingApprovalGroup'
    PendingApprovalGroup:
      type: object
      required:
        - productArea
        - pendingCount
        - items
      properties:
        productArea:
          type: string
        pendingCount:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/PendingApprovalItem'
    PendingApprovalItem:
      type: object
      required:
        - id
        - title
        - productArea
        - startAt
        - endAt
        - requestedBy
        - requestedAt
        - latestReason
        - version
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        productArea:
          type: string
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        requestedBy:
          type: string
        requestedAt:
          type: string
          format: date-time
        latestReason:
          type: string
        version:
          type: integer
