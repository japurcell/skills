openapi: 3.1.0
info:
  title: Audit Log Export Admin API
  version: 1.0.0
  description: >-
    Admin-facing API for requesting, tracking, cancelling, and downloading
    asynchronous audit-log exports. Authentication is supplied by the existing
    product auth stack; every successful operation requires the
    `compliance_admin` role.
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
paths:
  /admin/audit-exports:
    post:
      tags: [AuditExport]
      summary: Queue a new audit-log export
      description: >-
        Accepts export filters, verifies the caller has the `compliance_admin`
        role, records the request, and queues background processing.
      operationId: createAuditExport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAuditExportRequest'
      responses:
        '202':
          description: Export request accepted and queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportJobResponse'
        '400':
          description: Invalid date range or filter values
        '403':
          description: Caller is authenticated but lacks `compliance_admin`
  /admin/audit-exports/{exportId}:
    get:
      tags: [AuditExport]
      summary: Get export job status
      description: Returns durable lifecycle state, progress, and artifact expiry metadata.
      operationId: getAuditExport
      parameters:
        - $ref: '#/components/parameters/ExportId'
      responses:
        '200':
          description: Export job status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportJobResponse'
        '403':
          description: Caller lacks `compliance_admin`
        '404':
          description: Export job not found
  /admin/audit-exports/{exportId}/cancel:
    post:
      tags: [AuditExport]
      summary: Request cancellation of a queued or running export
      description: Marks the export for cooperative cancellation by the worker.
      operationId: cancelAuditExport
      parameters:
        - $ref: '#/components/parameters/ExportId'
      responses:
        '202':
          description: Cancellation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelExportResponse'
        '403':
          description: Caller lacks `compliance_admin`
        '404':
          description: Export job not found
        '409':
          description: Export job is already in a terminal state
  /admin/audit-exports/{exportId}/downloads/{format}:
    get:
      tags: [AuditExport]
      summary: Mint a signed download link for a completed export artifact
      description: >-
        Verifies completion state, role access, artifact existence, and expiry
        before returning a time-limited signed URL.
      operationId: getAuditExportDownload
      parameters:
        - $ref: '#/components/parameters/ExportId'
        - name: format
          in: path
          required: true
          schema:
            type: string
            enum: [csv, json]
      responses:
        '200':
          description: Signed download link created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DownloadLinkResponse'
        '403':
          description: Caller lacks `compliance_admin`
        '404':
          description: Export job or requested artifact not found
        '409':
          description: Export is not yet complete
        '410':
          description: Artifact exists but the 24-hour download window has expired
components:
  parameters:
    ExportId:
      name: exportId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    CreateAuditExportRequest:
      type: object
      additionalProperties: false
      required: [dateFrom, dateTo]
      properties:
        dateFrom:
          type: string
          format: date
        dateTo:
          type: string
          format: date
        actorType:
          type: string
          description: Optional actor taxonomy value from the existing product domain
        actionCategory:
          type: string
          description: Optional action-category taxonomy value from the existing product domain
    ExportFilters:
      type: object
      additionalProperties: false
      required: [dateFrom, dateTo]
      properties:
        dateFrom:
          type: string
          format: date
        dateTo:
          type: string
          format: date
        actorType:
          type: string
        actionCategory:
          type: string
    ExportArtifactSummary:
      type: object
      additionalProperties: false
      required: [format, contentType, byteSize]
      properties:
        format:
          type: string
          enum: [csv, json]
        contentType:
          type: string
        byteSize:
          type: integer
          minimum: 0
        checksum:
          type: string
          nullable: true
    ExportJobResponse:
      type: object
      additionalProperties: false
      required:
        [id, status, filters, progressPct, recordsProcessed, recordsExported, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, running, failed, completed, cancelled]
        filters:
          $ref: '#/components/schemas/ExportFilters'
        progressPct:
          type: integer
          minimum: 0
          maximum: 100
        recordsProcessed:
          type: integer
          minimum: 0
        recordsExported:
          type: integer
          minimum: 0
        safeFieldsetVersion:
          type: string
        failureCode:
          type: string
          nullable: true
        failureReason:
          type: string
          nullable: true
        downloadExpiresAt:
          type: string
          format: date-time
          nullable: true
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/ExportArtifactSummary'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        cancelledAt:
          type: string
          format: date-time
          nullable: true
    CancelExportResponse:
      type: object
      additionalProperties: false
      required: [id, status, cancelRequestedAt]
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, running, cancelled]
        cancelRequestedAt:
          type: string
          format: date-time
        message:
          type: string
    DownloadLinkResponse:
      type: object
      additionalProperties: false
      required: [exportId, format, url, expiresAt]
      properties:
        exportId:
          type: string
          format: uuid
        format:
          type: string
          enum: [csv, json]
        url:
          type: string
          format: uri
        expiresAt:
          type: string
          format: date-time
