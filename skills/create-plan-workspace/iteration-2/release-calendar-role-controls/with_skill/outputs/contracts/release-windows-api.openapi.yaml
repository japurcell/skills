openapi: 3.0.3
info:
  title: Release Windows Role-Control API
  version: 2.0.0
  description: >-
    Versioned contracts for release calendar role controls and approval workflow.
servers:
  - url: https://api.example.internal
paths:
  /v2/release-windows/pending-approvals:
    get:
      summary: List pending approvals grouped by product area
      parameters:
        - in: query
          name: productArea
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Grouped pending approvals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PendingApprovalsResponse"
  /v2/release-windows/{id}/propose:
    post:
      summary: Propose a draft release window for approval
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransitionCommand"
      responses:
        "200":
          description: Proposal accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseWindow"
        "403":
          description: Role not authorized
        "409":
          description: Invalid transition or version conflict
  /v2/release-windows/{id}/approve:
    post:
      summary: Approve a proposed release window
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransitionCommand"
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseWindow"
        "403":
          description: Role not authorized
        "409":
          description: Invalid transition or version conflict
  /v2/release-windows/{id}/reject:
    post:
      summary: Reject (block) a proposed release window
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransitionCommand"
      responses:
        "200":
          description: Rejected and moved to blocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseWindow"
        "403":
          description: Role not authorized
        "409":
          description: Invalid transition or version conflict
components:
  schemas:
    ReleaseWindow:
      type: object
      required:
        - id
        - productArea
        - state
        - windowStart
        - windowEnd
        - version
      properties:
        id:
          type: string
          format: uuid
        productArea:
          type: string
        title:
          type: string
        state:
          type: string
          enum: [draft, proposed, approved, blocked, cancelled]
        windowStart:
          type: string
          format: date-time
        windowEnd:
          type: string
          format: date-time
        version:
          type: integer
    TransitionCommand:
      type: object
      required:
        - reason
        - expectedVersion
      properties:
        reason:
          type: string
          minLength: 1
        expectedVersion:
          type: integer
          minimum: 1
    PendingApprovalsResponse:
      type: object
      required:
        - groups
      properties:
        groups:
          type: array
          items:
            type: object
            required:
              - productArea
              - count
              - items
            properties:
              productArea:
                type: string
              count:
                type: integer
              items:
                type: array
                items:
                  $ref: "#/components/schemas/ReleaseWindow"
